                      - name: Open Review (OPENAI COMPATIBLE)
  # You may pin to the exact commit or the version.
  # uses: nx-solutions-ug/open-review@9c293963c17b75665396002455589c4e43814c3a
  uses: nx-solutions-ug/open-review@v1
  with:
    # Base URL for the LLM API (OpenAI-compatible endpoint)
    LLM_BASE_URL: # default is https://api.openai.com/v1
    # Model to use for code review (e.g., gpt-4, gpt-4o, claude-3-sonnet)
    LLM_MODEL: # default is gpt-4o
    # API key for the LLM service
    LLM_API_KEY: 
    # Custom prompt template for the LLM review
    PROMPT: # optional, default is 
    # GitHub token for API access
    GITHUB_TOKEN: # default is ${{ github.token }}
    # Review mode: summary, detailed, security, or performance
    REVIEW_MODE: # optional, default is detailed
    # Maximum number of files to review (0 for unlimited)
    MAX_FILES: # optional, default is 50
    # Comma-separated file patterns to exclude (e.g., *.md,*.json,dist/**)
    EXCLUDE_PATTERNS: # optional, default is *.lock,*.min.js,*.min.css,dist/**,build/**,node_modules/**,coverage/**
    # Fail the workflow if the review encounters an error
    FAIL_ON_ERROR: # optional, default is false
    # Post review as a formal PR review (true) or as comments (false)
    POST_AS_REVIEW: # optional, default is true
